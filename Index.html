<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Management Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-users-gear"></i> श्रमिक पोर्टल
            </h1>
            <div class="flex gap-4">
                <button onclick="window.location.reload()" class="hover:bg-blue-700 px-3 py-1.5 rounded-lg transition text-sm font-medium">होम</button>
                <button onclick="openAddWorkerModal()" class="bg-white text-blue-600 hover:bg-gray-100 px-3 py-1.5 rounded-lg transition text-sm font-semibold shadow">+ नया वर्कर</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="filterWorkers()" placeholder="वर्कर का नाम या स्किल खोजें..." class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <button onclick="filterCategory('all')" id="btn-all" class="filter-btn bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition">सभी</button>
                <button onclick="filterCategory('Plumber')" id="btn-Plumber" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-medium transition">प्लंबर</button>
                <button onclick="filterCategory('Electrician')" id="btn-Electrician" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-medium transition">इलेक्ट्रीशियन</button>
                <button onclick="filterCategory('Carpenter')" id="btn-Carpenter" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-medium transition">कारपेंटर</button>
            </div>
        </div>

        <div id="workersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="workerModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 overflow-y-auto transition-opacity">
        <div class="bg-white rounded-2xl max-w-3xl w-full my-8 overflow-hidden shadow-2xl transform scale-95 transition-transform max-h-[90vh] flex flex-col">
            
            <div class="bg-blue-600 p-4 text-white flex justify-between items-center sticky top-0 z-10">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-file-invoice"></i> वर्कर डैशबोर्ड एवं रिकॉर्ड</h3>
                <div class="flex gap-2">
                    <button onclick="printSection()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow flex items-center gap-1"><i class="fa-solid fa-print"></i> प्रिंट करें</button>
                    <button onclick="downloadPDF()" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow flex items-center gap-1"><i class="fa-solid fa-file-pdf"></i> PDF डाउनलोड</button>
                    <button onclick="closeModal()" class="text-white text-xl bg-black/20 hover:bg-black/40 w-8 h-8 rounded-full flex items-center justify-center transition">&times;</button>
                </div>
            </div>

            <div id="printableArea" class="p-6 overflow-y-auto space-y-6 flex-1 bg-gray-50">
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-center gap-4">
                    <img id="modalImg" src="" alt="Profile" class="w-24 h-24 rounded-full border-4 border-blue-100 object-cover shadow-md bg-gray-200">
                    <div class="text-center sm:text-left flex-1">
                        <h3 id="modalName" class="text-2xl font-bold text-gray-900"></h3>
                        <p id="modalSkill" class="text-blue-600 font-semibold text-sm bg-blue-50 inline-block px-3 py-0.5 rounded-full mt-1"></p>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-3 text-sm text-gray-600">
                            <div><span class="text-xs text-gray-400 block font-medium">अनुभव:</span> <span id="modalExp" class="font-semibold text-gray-800"></span></div>
                            <div><span class="text-xs text-gray-400 block font-medium">रेटिंग:</span> <span id="modalRating" class="text-amber-500 font-semibold"></span></div>
                            <div><span class="text-xs text-gray-400 block font-medium">फोन:</span> <span id="modalPhone" class="font-semibold text-gray-800"></span></div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-5">
                    <h4 class="text-base font-bold text-gray-900 border-b pb-2 text-blue-600"><i class="fa-solid fa-calendar-check mr-1"></i> दैनिक उपस्थिति, कार्य एवं सामग्री ट्रैकिंग सेक्शन</h4>
                    
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">1. आज की उपस्थिति (Attendance)</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 text-sm font-medium text-emerald-700"><input type="radio" name="attendanceStatus" value="Present" checked class="w-4 h-4 accent-emerald-600"> उपस्थित (Present)</label>
                            <label class="flex items-center gap-2 text-sm font-medium text-rose-700"><input type="radio" name="attendanceStatus" value="Absent" class="w-4 h-4 accent-rose-600"> अनुपस्थित (Absent)</label>
                            <label class="flex items-center gap-2 text-sm font-medium text-amber-700"><input type="radio" name="attendanceStatus" value="Half-Day" class="w-4 h-4 accent-amber-600"> हाफ-डे (Half Day)</label>
                        </div>
                    </div>

                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 space-y-3">
                        <label class="block text-xs font-bold text-gray-700 uppercase">2. कौन सा काम पूरा हुआ (Work Completed Detail)</label>
                        <textarea id="workDetailInput" rows="2" placeholder="आज पूरा किए गए कार्य का विवरण यहाँ लिखें..." class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                        
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">कार्य प्रगति इमेज अपलोड करें (गैलरी/कैमरा):</label>
                            <input type="file" id="workImageFile" accept="image/*" onchange="previewWorkImage(event)" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                            <div class="mt-2 hidden" id="workImgPreviewContainer">
                                <img id="workImgPreview" src="" class="max-h-40 rounded-lg border object-cover shadow-xs">
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">3. सामग्री आगमन (Material IN)</label>
                            <input type="text" id="materialInInput" placeholder="आई हुई सामग्री और मात्रा लिखें..." class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">4. सामग्री निकासी (Material OUT)</label>
                            <input type="text" id="materialOutInput" placeholder="साइट से बाहर गई सामग्री का विवरण..." class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white outline-none">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
                    <h4 class="text-base font-bold text-gray-900 border-b pb-2 text-emerald-600"><i class="fa-solid fa-coins mr-1"></i> श्रमिक बिलिंग एवं अग्रिम (Advance) खाता अनुभाग</h4>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">कुल कार्य दिवस (Days Work):</label>
                            <input type="number" id="billingDays" oninput="calculateBilling()" placeholder="दिनों की संख्या" class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">दैनिक हाजिरी रेट (Hajary Rate):</label>
                            <input type="number" id="billingRate" oninput="calculateBilling()" placeholder="₹ प्रति दिन रेट" class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">कुल मजदूरी (Total Amount):</label>
                            <input type="number" id="billingTotal" readonly class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-100 font-bold text-gray-800">
                        </div>
                    </div>

                    <div class="bg-amber-50/50 p-3 rounded-lg border border-amber-200 space-y-3">
                        <label class="block text-xs font-bold text-amber-800 uppercase"><i class="fa-solid fa-hand-holding-dollar"></i> एडवांस भुगतान विवरण (Advance History)</label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                            <input type="date" id="advDate" class="p-2 border border-gray-300 rounded-lg text-sm bg-white">
                            <input type="number" id="advAmount" placeholder="₹ एडवांस राशि" class="p-2 border border-gray-300 rounded-lg text-sm bg-white">
                            <input type="text" id="advReason" placeholder="एडवान्स लेने का कारण" class="p-2 border border-gray-300 rounded-lg text-sm bg-white">
                        </div>
                        <button type="button" onclick="addAdvanceRow()" class="bg-amber-600 hover:bg-amber-700 text-white text-xs px-3 py-1.5 rounded-md transition font-semibold">+ एडवांस एंट्री जोड़ें</button>
                        
                        <div class="overflow-x-auto mt-2">
                            <table class="w-full text-left text-xs bg-white border rounded-lg overflow-hidden">
                                <thead class="bg-amber-100 text-amber-900">
                                    <tr>
                                        <th class="p-2 border-b">तारीख</th>
                                        <th class="p-2 border-b">राशि (₹)</th>
                                        <th class="p-2 border-b">कारण / विवरण</th>
                                    </tr>
                                </thead>
                                <tbody id="advanceTableBody">
                                    <tr class="no-adv-row"><td colspan="3" class="p-2 text-center text-gray-400 italic">कोई एडवांस रिकॉर्ड नहीं है</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1"><i class="fa-solid fa-lock text-gray-400"></i> पोर्टल सुरक्षा पासवर्ड (टाइप करने योग्य)</label>
                    <input type="password" id="portalPassword" placeholder="अपना गुप्त पासवर्ड यहाँ टाइप करें..." class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>

            </div>
        </div>
    </div>

    <div id="addWorkerModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl max-w-md w-full overflow-hidden shadow-2xl transform scale-95 transition-transform">
            <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-base"><i class="fa-solid fa-user-plus"></i> नया श्रमिक पंजीकृत करें</h3>
                <button onclick="closeAddWorkerModal()" class="text-white text-xl bg-black/20 hover:bg-black/40 w-7 h-7 rounded-full flex items-center justify-center transition">&times;</button>
            </div>
            <form onsubmit="saveNewWorker(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">पूरा नाम:</label>
                    <input type="text" id="newName" required class="w-full p-2 border rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">स्किल / केटेगरी:</label>
                    <select id="newSkill" class="w-full p-2 border rounded-lg text-sm outline-none bg-white">
                        <option value="Plumber">Plumber (प्लंबर)</option>
                        <option value="Electrician">Electrician (इलेक्ट्रीशियन)</option>
                        <option value="Carpenter">Carpenter (कारपेंटर)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">अनुभव (Exp):</label>
                        <input type="text" id="newExp" placeholder="उदा. 3 साल" required class="w-full p-2 border rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">रेटिंग दें:</label>
                        <input type="text" id="newRating" value="5.0 ★" class="w-full p-2 border rounded-lg text-sm outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">मोबाइल नंबर:</label>
                    <input type="text" id="newPhone" required class="w-full p-2 border rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">प्रोफाइल फोटो अपलोड (कैमरा/गैलरी):</label>
                    <input type="file" id="newWorkerPhoto" accept="image/*" class="w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 cursor-pointer">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-2.5 rounded-xl text-sm transition shadow-md">सफलतापूर्वक सेव करें</button>
            </form>
        </div>
    </div>

    <script>
        // 1. मुख्य वर्कर डेटाबेस सूचि
        const workers = [
            { id: 1, name: "राजेश कुमार", skill: "Plumber", exp: "5 साल", rating: "4.8 ★", phone: "+91 98765 43210", img: "https://images.unsplash.com/photo-1540569014015-19a7be504e3a?w=400&auto=format&fit=crop&q=60" },
            { id: 2, name: "अमित शर्मा", skill: "Electrician", exp: "3 साल", rating: "4.5 ★", phone: "+91 87654 32109", img: "https://images.unsplash.com/photo-1566492031773-4f4e44671857?w=400&auto=format&fit=crop&q=60" },
            { id: 3, name: "विक्रम सिंह", skill: "Carpenter", exp: "8 साल", rating: "4.9 ★", phone: "+91 76543 21098", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&auto=format&fit=crop&q=60" },
            { id: 4, name: "सुनील यादव", skill: "Plumber", exp: "4 साल", rating: "4.2 ★", phone: "+91 65432 10987", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400&auto=format&fit=crop&q=60" },
            { id: 5, name: "संजय वर्मा", skill: "Electrician", exp: "6 साल", rating: "4.7 ★", phone: "+91 95551 23456", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&auto=format&fit=crop&q=60" }
        ];

        let currentCategory = 'all';
        let selectedWorkerId = null;

        // 2. वर्कर कार्ड्स रेंडर करना
        function displayWorkers(data) {
            const grid = document.getElementById('workersGrid');
            grid.innerHTML = '';
            
            if(data.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 font-medium">कोई वर्कर नहीं मिला।</div>`;
                return;
            }

            data.forEach(worker => {
                const card = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition duration-300 flex flex-col justify-between">
                        <div class="p-5 flex items-start gap-4">
                            <img src="${worker.img}" alt="${worker.name}" class="w-16 h-16 rounded-full object-cover bg-gray-100 border flex-shrink-0">
                            <div>
                                <h2 class="text-base font-bold text-gray-900">${worker.name}</h2>
                                <span class="inline-block text-xs font-semibold bg-blue-50 text-blue-600 px-2.5 py-0.5 rounded-full mt-1">${worker.skill}</span>
                                <div class="flex items-center gap-4 mt-3 text-xs text-gray-500">
                                    <span><i class="fa-solid fa-briefcase text-gray-400 mr-1"></i> ${worker.exp}</span>
                                    <span class="text-amber-500 font-medium"><i class="fa-solid fa-star mr-1"></i> ${worker.rating}</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 px-5 py-3 border-t border-gray-100 flex gap-2">
                            <button onclick="viewProfile(${worker.id})" class="w-full bg-white hover:bg-gray-100 border border-gray-300 text-gray-700 py-2 rounded-lg text-xs font-semibold transition shadow-sm">प्रबंधन (Manage)</button>
                            <a href="tel:${worker.phone}" class="bg-green-600 hover:bg-green-700 text-white p-2 px-3 rounded-lg text-xs transition flex items-center justify-center shadow-sm" title="कॉल करें"><i class="fa-solid fa-phone"></i></a>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // Live Search Filter
        function filterWorkers() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const filtered = workers.filter(worker => {
                const matchesSearch = worker.name.toLowerCase().includes(searchValue) || worker.skill.toLowerCase().includes(searchValue);
                const matchesCategory = currentCategory === 'all' || worker.skill === currentCategory;
                return matchesSearch && matchesCategory;
            });
            displayWorkers(filtered);
        }

        // Category Buttons
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            const activeBtn = document.getElementById(`btn-${category}`);
            activeBtn.classList.remove('bg-gray-100', 'text-gray-600');
            activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
            filterWorkers();
        }

        // Open Worker Management Profile Modal
        function viewProfile(id) {
            selectedWorkerId = id;
            const worker = workers.find(w => w.id === id);
            if(!worker) return;

            document.getElementById('modalImg').src = worker.img;
            document.getElementById('modalName').innerText = worker.name;
            document.getElementById('modalSkill').innerText = worker.skill;
            document.getElementById('modalExp').innerText = worker.exp;
            document.getElementById('modalRating').innerText = worker.rating;
            document.getElementById('modalPhone').innerText = worker.phone;

            // Reset Sub-forms fields
            document.getElementById('workDetailInput').value = '';
            document.getElementById('materialInInput').value = '';
            document.getElementById('materialOutInput').value = '';
            document.getElementById('workImageFile').value = '';
            document.getElementById('workImgPreviewContainer').classList.add('hidden');
            document.getElementById('workImgPreview').src = '';
            document.getElementById('billingDays').value = '';
            document.getElementById('billingRate').value = '';
            document.getElementById('billingTotal').value = '';
            document.getElementById('advanceTableBody').innerHTML = '<tr class="no-adv-row"><td colspan="3" class="p-2 text-center text-gray-400 italic">कोई एडवांस रिकॉर्ड नहीं है</td></tr>';
            document.getElementById('portalPassword').value = '';

            const modal = document.getElementById('workerModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('workerModal');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 150);
        }

        // Preview Camera/Gallery Work Progress Image
        function previewWorkImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgPreview = document.getElementById('workImgPreview');
                    imgPreview.src = e.target.result;
                    document.getElementById('workImgPreviewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // Calculate Worker Billing Automatically
        function calculateBilling() {
            const days = parseFloat(document.getElementById('billingDays').value) || 0;
            const rate = parseFloat(document.getElementById('billingRate').value) || 0;
            document.getElementById('billingTotal').value = days * rate;
        }

        // Add Advance Records Rows
        function addAdvanceRow() {
            const date = document.getElementById('advDate').value;
            const amount = document.getElementById('advAmount').value;
            const reason = document.getElementById('advReason').value;

            if(!date || !amount) {
                alert("कृपया एडवांस तारीख और राशि अवश्य भरें!");
                return;
            }

            const noRow = document.querySelector('.no-adv-row');
            if(noRow) noRow.remove();

            const tbody = document.getElementById('advanceTableBody');
            const tr = document.createElement('tr');
            tr.className = "border-b hover:bg-gray-50";
            tr.innerHTML = `
                <td class="p-2 text-gray-800">${date}</td>
                <td class="p-2 font-bold text-amber-700">₹${amount}</td>
                <td class="p-2 text-gray-600">${reason || '-'}</td>
            `;
            tbody.appendChild(tr);

            // clear fields
            document.getElementById('advDate').value = '';
            document.getElementById('advAmount').value = '';
            document.getElementById('advReason').value = '';
        }

        // Error-free Direct Printing Feature
        function printSection() {
            const printableContent = document.getElementById('printableArea').innerHTML;
            const originalContent = document.body.innerHTML;
            
            document.body.innerHTML = `<div style="padding:20px; background:#fff; color:#000;">${printableContent}</div>`;
            window.print();
            
            // Reload back smoothly to secure states
            window.location.reload();
        }

        // HTML to PDF Generator (Guaranteed No Error Lib Approach)
        function downloadPDF() {
            const element = document.getElementById('printableArea');
            const workerName = document.getElementById('modalName').innerText || 'Worker';
            const opt = {
                margin:       0.5,
                filename:     `${workerName}_Report.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Management of New Worker Overlay Modal
        function openAddWorkerModal() {
            const modal = document.getElementById('addWorkerModal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.firstElementChild.classList.replace('scale-95', 'scale-100'); }, 50);
        }

        function closeAddWorkerModal() {
            const modal = document.getElementById('addWorkerModal');
            modal.firstElementChild.classList.replace('scale-100', 'scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 150);
        }

        // Save Worker logic using camera/gallery file API
        function saveNewWorker(e) {
            e.preventDefault();
            const name = document.getElementById('newName').value;
            const skill = document.getElementById('newSkill').value;
            const exp = document.getElementById('newExp').value;
            const rating = document.getElementById('newRating').value;
            const phone = document.getElementById('newPhone').value;
            const photoFile = document.getElementById('newWorkerPhoto').files[0];

            let defaultImg = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400&auto=format&fit=crop&q=60";

            const saveProcess = (imgUrl) => {
                const newId = workers.length + 1;
                workers.push({ id: newId, name, skill, exp, rating, phone, img: imgUrl });
                displayWorkers(workers);
                closeAddWorkerModal();
                e.target.reset();
                alert(`${name} को सफलतापूर्वक जोड़ दिया गया है!`);
            };

            if(photoFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    saveProcess(event.target.result);
                };
                reader.readAsDataURL(photoFile);
            } else {
                saveProcess(defaultImg);
            }
        }

        // Initial setup run
        document.addEventListener('DOMContentLoaded', () => {
            displayWorkers(workers);
        });
    </script>
</body>
</html>
